name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    name: Backend — lint · type · test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: timescale/timescaledb-ha:pg15
        env:
          POSTGRES_USER: finpilot
          POSTGRES_PASSWORD: finpilot
          POSTGRES_DB: finpilot
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U finpilot -d finpilot"
          --health-interval 10s --health-timeout 5s --health-retries 15
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql+asyncpg://finpilot:finpilot@localhost:5432/finpilot
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: ci-test-secret-not-for-prod-000000000000000000000000
      ENVIRONMENT: test
      FINPILOT_INTEGRATION: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt pip-audit

      - name: Ruff lint
        run: ruff check .

      - name: Mypy type check
        run: python -m mypy app/ --ignore-missing-imports

      - name: pip-audit (dependency vulnerabilities)
        run: pip-audit -r requirements.txt || true

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Pytest with coverage
        run: python -m pytest tests/ --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=80 -q

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml
          retention-days: 7

  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — type · build · test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript check
        run: npm run typecheck

      - name: Vitest unit tests
        run: npm test -- --reporter=verbose

      - name: Next.js production build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

      - name: npm audit (high severity only)
        run: npm audit --audit-level=high || true

  # ── Security scan ───────────────────────────────────────────────────────────
  security:
    name: Security — ZAP baseline
    runs-on: ubuntu-latest
    needs: backend
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Start backend stack
        run: docker compose up -d backend db redis --wait
        env:
          JWT_SECRET_KEY: ci-zap-secret-000000000000000000000000000000

      - name: Wait for API
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && break
            sleep 2
          done

      - name: OWASP ZAP baseline scan
        run: |
          docker run --network host \
            -v "$PWD:/zap/wrk/:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
              -t http://localhost:8000 \
              -r zap-report.html \
              -J zap-report.json \
              -I \
              -c zap.conf \
            || true

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: |
            zap-report.html
            zap-report.json
          retention-days: 14

  # ── E2E tests ───────────────────────────────────────────────────────────────
  e2e:
    name: E2E — Playwright
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        run: |
          npm install -g @playwright/test
          npx playwright install --with-deps chromium

      - name: Start full stack
        run: docker compose up -d --wait
        env:
          JWT_SECRET_KEY: ci-e2e-secret-000000000000000000000000000000

      - name: Run Playwright tests
        run: npx playwright test
        working-directory: tests/e2e
        env:
          BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: .playwright-report/
          retention-days: 7
