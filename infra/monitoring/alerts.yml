groups:
  - name: finpilot_slo
    interval: 30s
    rules:
      # API availability < 99.9%
      - alert: HighErrorRate
        expr: |
          rate(http_requests_total{status=~"5.."}[5m])
          / rate(http_requests_total[5m]) > 0.001
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Error rate above 0.1% — SLO at risk"
          description: "{{ $value | humanizePercentage }} of requests are failing."

      # p99 latency > 2s
      - alert: HighLatency
        expr: |
          histogram_quantile(0.99,
            rate(http_request_duration_seconds_bucket[5m])
          ) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "p99 latency above 2s"
          description: "99th percentile latency is {{ $value }}s."

      # Backend down
      - alert: BackendDown
        expr: up{job="finpilot_backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "FinPilot backend is unreachable"
          description: "Prometheus cannot scrape {{ $labels.instance }}."

  - name: finpilot_ml
    rules:
      # Fraud detection rate drops to zero for > 10 min (model may be broken)
      - alert: FraudDetectorSilent
        expr: rate(finpilot_fraud_detections_total[10m]) == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Fraud detector has not fired in 10 minutes"

      # MFA failure rate spike
      - alert: MFAFailureSpike
        expr: |
          rate(finpilot_mfa_verifications_total{result="failure"}[5m])
          > 0.5
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "TOTP failure rate elevated — possible brute-force"
