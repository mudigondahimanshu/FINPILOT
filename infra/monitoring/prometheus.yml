global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: finpilot
    environment: production

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: []  # wire up Alertmanager here in prod

scrape_configs:
  - job_name: finpilot_backend
    static_configs:
      - targets: [finpilot-backend:8000]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]
