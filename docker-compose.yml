# FinPilot — full local dev stack.  `docker compose up --build`
# Services: db (Postgres+TimescaleDB+pgvector), redis, backend, worker, frontend.

name: finpilot

services:
  db:
    # timescaledb-ha bundles TimescaleDB + pgvector on Postgres 15.
    image: timescale/timescaledb-ha:pg15
    container_name: finpilot-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finpilot}
      POSTGRES_DB: ${POSTGRES_DB:-finpilot}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/home/postgres/pgdata/data
      - ./infra/docker/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finpilot} -d ${POSTGRES_DB:-finpilot}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: finpilot-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finpilot-backend
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: db
      REDIS_HOST: redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    # Apply migrations on boot so the stack is self-bootstrapping, then serve.
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"]

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finpilot-worker
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: db
      REDIS_HOST: redis
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: ["celery", "-A", "app.core.celery_app.celery", "worker", "--loglevel=info"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: finpilot-frontend
    restart: unless-stopped
    env_file: .env
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: ["npm", "run", "dev"]

volumes:
  db_data:
  redis_data:
