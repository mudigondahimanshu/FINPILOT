# ZAP Baseline Scan configuration for FinPilot
# Rule IDs: https://www.zaproxy.org/docs/alerts/

# IGNORE: Server leaks version in the "Server" HTTP response header field
# (FastAPI/Uvicorn; acceptable in non-prod; mitigated by ALB in prod)
10036	IGNORE	(Server Leaks Version Information via "Server" HTTP Response Header Field)

# IGNORE: X-Content-Type-Options header missing
# (API JSON responses; browsers don't interpret API responses as HTML)
10021	IGNORE	(X-Content-Type-Options Header Missing)

# IGNORE: Strict-Transport-Security not set
# (HTTP in CI; HSTS is set on nginx proxy in prod — see nginx.conf)
10035	IGNORE	(Strict-Transport-Security Header Not Set)

# IGNORE: Content-Security-Policy header missing
# (Pure JSON API; CSP is enforced on the nginx-proxied frontend)
10038	IGNORE	(Content Security Policy (CSP) Header Not Set)

# WARN: Cross-Domain JavaScript Source File Inclusion
# (FastAPI serves no HTML; flag is a false positive on JSON endpoints)
10017	WARN	(Cross-Domain JavaScript Source File Inclusion)

# WARN: Application Error Disclosure
# (validation errors intentionally include field details for API consumers)
90022	WARN	(Application Error Disclosure)

# IGNORE: Cookie No HttpOnly Flag
# (API returns JWT in JSON body, not cookies; no cookies set by backend)
10010	IGNORE	(Cookie No HttpOnly Flag)

# IGNORE: Cookie Without Secure Flag
# (same as above — no cookies)
10011	IGNORE	(Cookie Without Secure Flag)

# IGNORE: Cookie without SameSite Attribute
10054	IGNORE	(Cookie without SameSite Attribute)

# IGNORE: Retrieved from Cache
10050	IGNORE	(Retrieved from Cache)

# IGNORE: User Controllable HTML Element Attribute (Potential XSS)
# (API responses are JSON; no HTML rendering)
10031	IGNORE	(User Controllable HTML Element Attribute (Potential XSS))
